<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="format-detection" content="telephone=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>追光 - 健康打卡</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <!-- 首页 -->
        <div id="homePage" class="page">
            <div class="header">
                <h1>🔥 追光</h1>
                <p>一群人才能走得更远</p>
            </div>
            
            <div class="user-card">
                <div class="user-avatar" id="userAvatar">👤</div>
                <div class="user-name" id="userName">姜宏锋</div>
                <div class="user-location" id="userLocation">📍 舟山</div>
                
                <!-- 年度目标 -->
                <div class="annual-goal">
                    <div class="goal-label">🎯 年度目标</div>
                    <div class="goal-text" id="annualGoalText">活到 92 岁，苗条 3kg</div>
                    <div class="goal-progress">当前 78.75 → 75.75kg</div>
                </div>
                
                <!-- 月度进度 -->
                <div class="monthly-progress">
                    <div class="goal-label">📊 3 月进度</div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="monthlyProgressFill" style="width: 67%;"></div>
                    </div>
                    <div class="progress-text">
                        <span id="progressText">本月 4/6 达标</span>
                        <span id="progressPercent">67%</span>
                    </div>
                </div>
                
                <!-- 统计数据 -->
                <div class="stats">
                    <div class="stat-item">
                        <span class="stat-num" id="rankNum">3</span>
                        <span class="stat-label">群排名</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-num" id="streakNum">15</span>
                        <span class="stat-label">连续打卡</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-num" id="donationNum">500</span>
                        <span class="stat-label">乐捐 (元)</span>
                    </div>
                </div>
            </div>
            
            <!-- 功能按钮 -->
            <div class="action-buttons">
                <button class="btn-action" onclick="goToCheckin()">📝 今日打卡</button>
                <button class="btn-action btn-secondary" onclick="showGoals()">🎯 我的目标</button>
                <button class="btn-action btn-secondary" onclick="showRanking()">🏆 群排行榜</button>
                <button class="btn-action btn-secondary" onclick="showSettlement()">💰 月度结算</button>
            </div>
        </div>
        
        <!-- 打卡页 -->
        <div id="checkinPage" class="page hidden">
            <div class="checkin-header">
                <div class="checkin-date" id="checkinDate">3 月 29 日</div>
                <div class="checkin-weekday" id="checkinWeekday">周日</div>
                
                <!-- 地点选择 -->
                <div class="location-selector">
                    <input type="text" class="location-input" id="locationInput" placeholder="📍 当前地点" value="舟山">
                </div>
                
                <button class="btn-all-complete" onclick="completeAll()">✅ 全部完成</button>
            </div>
            
            <div class="checkin-list" id="checkinList">
                <!-- 动态生成打卡项目 -->
            </div>
            
            <div class="feeling-section">
                <textarea class="feeling-input" id="feelingInput" placeholder="💭 今日感悟（可选）" rows="3"></textarea>
            </div>
            
            <div class="action-buttons">
                <button class="btn-action" onclick="submitCheckin()" style="width: 100%;">确认打卡并分享</button>
                <button class="btn-action btn-secondary" onclick="goHome()" style="width: 100%;">取消</button>
            </div>
        </div>
        
        <!-- 打卡卡片页 -->
        <div id="cardPage" class="page hidden">
            <div style="padding: var(--space-5) var(--space-5) 0; text-align: center;">
                <button class="btn-action btn-secondary" onclick="goHome()" style="padding: var(--space-3) var(--space-5); font-size: 14px;">← 返回首页</button>
            </div>
            
            <div class="card-preview" id="cardPreview">
                <!-- 动态生成打卡卡片 -->
            </div>
            
            <div class="action-buttons">
                <button class="btn-action" onclick="shareCard()" style="width: 100%;">📤 截图分享</button>
                <p class="text-center" style="color: var(--gray-500); font-size: 12px; margin-top: var(--space-4);">长按保存图片，或截图分享到群</p>
            </div>
        </div>
        
        <!-- 我的目标页 -->
        <div id="goalsPage" class="page hidden">
            <div style="padding: var(--space-6); background: var(--primary-gradient); color: var(--white);">
                <button onclick="goHome()" style="background:transparent;border:none;color:var(--white);font-size:24px;cursor:pointer;">←</button>
                <h1 style="font-size: 24px; font-weight: 800; margin-top: var(--space-3);">🎯 我的目标</h1>
            </div>
            <div style="padding: var(--space-6);">
                <div class="empty-state">
                    <div class="empty-icon">🎯</div>
                    <div class="empty-text">目标设定功能开发中...</div>
                    <button class="btn-action" onclick="addDemoGoals()" style="padding: var(--space-3) var(--space-5); font-size: 14px;">添加示例目标</button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 底部导航 -->
    <div class="bottom-nav" id="bottomNav">
        <div class="nav-item active" onclick="goHome()">
            <span class="nav-icon">🏠</span>
            <span>首页</span>
        </div>
        <div class="nav-item" onclick="goToCheckin()">
            <span class="nav-icon">📝</span>
            <span>打卡</span>
        </div>
        <div class="nav-item" onclick="showRanking()">
            <span class="nav-icon">🏆</span>
            <span>排行</span>
        </div>
        <div class="nav-item" onclick="showProfile()">
            <span class="nav-icon">👤</span>
            <span>我的</span>
        </div>
    </div>
    
    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
